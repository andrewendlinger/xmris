version: 1
project:
  title: xmris
  description: An xarray-based MRI and MRS toolbox
  github: https://github.com/andrewendlinger/xmris
  references:
    xarray:
      url: https://docs.xarray.dev/en/stable/
  exclude:
    - "notebooks/**/*.ipynb"

  toc:
    - file: index.md

    # 1. GROUP: Core concepts and basic usage
    - title: Basics
      children:
        - file: notebooks/basics/architecture.md
          title: The xmris Architecture
        - file: notebooks/basics/complex_numbers.md
          title: 01. Complex Numbers
        - file: notebooks/basics/fft.md
          title: 02. FFT Basics
        - file: notebooks/basics/fid_transformations.md
          title: 03. FID & Spectrum
        - file: notebooks/basics/hz_and_ppm.md
          title: 03. Hz and ppm

    # 2. GROUP: A chronological processing pipeline
    - title: Processing Pipeline
      children:
        - file: notebooks/pipeline/zero_fill.md
          title: 1. Zero Filling
        - file: notebooks/pipeline/apodization.md
          title: 2. Apodization
        - file: notebooks/pipeline/phase.md
          title: 3. Phase Correction
        - file: notebooks/pipeline/autophasing.md
          title: 4. Automated Phase Correction

    # 3. GROUP: Advanced Quantification
    - title: Spectral Fitting & Simulation
      children:
        - file: notebooks/fitting/simufid.md
          title: FID Simulation
        - file: notebooks/fitting/pyamares.md
          title: pyAMARES - Part I
        - file: notebooks/fitting/pyamares_advanced.md
          title: pyAMARES - Part II

    # 4. GROUP: Visualization / plotting
    - title: Visualization
      children:
        - title: Plotting
          children:
            - file: notebooks/visualization/plot/01_plotting_basics.md
              title: 1. Intro with RidgePlot
            - file: notebooks/visualization/plot/02_plot_waterfall.md
              title: 1. 1D+Time, Waterfall Plot
            - file: notebooks/visualization/plot/02_plotting_heatmap.md
              title: 2. 1D+Time, Heatmap Plot
            - file: notebooks/visualization/plot/03_plotting_fit_1d.md
              title: 3. 1D+Time, pyAMARES data
        - title: Widgets
          children:
            - file: notebooks/visualization/widget/01_widget_phase.md
              title: 1. Spectrum phasing
            - file: notebooks/visualization/widget/02_widget_scroller.md
              title: 2. Srcolling through spectra

    # 5. GROUP: Vendor Specific
    - title: Vendor Specific
      children:
        - file: notebooks/vendor/bruker_filter_removal.md
          title: Bruker - Digital Filter
        - file: notebooks/vendor/bruker_fid_loader.md
          title: Bruker - FID Loading


    # 6. API Ref
    - title: API Reference
      file: api_reference/index.md
      children:
        # --- 1. Processing Submenu ---
        - title: Signal Processing
          children:
            - file: api_reference/processing.fourier.md
              title: Fourier Transforms
            - file: api_reference/processing.fid.md
              title: FID Processing
            - file: api_reference/processing.phasing.md
              title: Phase Correction

        # --- 2. Visualization Submenu ---
        - title: Visualization
          children:
            - file: api_reference/visualization.plot.plot_waterfall.md
              title: Waterfall Plot
            - file: api_reference/WaterfallConfig.md
              title: Waterfall Config

            - file: api_reference/visualization.plot.plot_heatmap.md
              title: Heatmap Plot
            - file: api_reference/PlotHeatmapConfig.md
              title: Heatmap Plot - Config

            - file: api_reference/visualization.plot.plot_trajectory.md
              title: Trajectory Plot
            - file: api_reference/PlotTrajectoryConfig.md
              title: Trajectory Plot - Config

            - file: api_reference/visualization.plot.plot_qc_grid.md
              title: QC Grid Plot
            - file: api_reference/PlotQCGridConfig.md
              title: QC Grid Plot - Config

        # --- 3. Fitting & Vendors Submenu ---
        - title: Modeling & Vendors
          children:
            - file: api_reference/fitting.amares.md
              title: AMARES Fitting
            - file: api_reference/vendor.bruker.md
              title: Bruker Formats

        # --- 4. Core Submenu ---
        - title: Core Utilities
          children:
            - file: api_reference/core.accessor.md
              title: Xarray Accessors
            - file: api_reference/core.config.md
              title: Global Config
            - file: api_reference/core.utils.md
              title: Utilities
            - file: api_reference/core.validation.md
              title: Validation

    # 7. Contribute
    - title: Contribute
      children:
        - file: contributing/guide.md
          title: Contributing Guide
        - file: contributing/setup.md
          title: Environment Setup
        - file: contributing/publishing.md
          title: Publishing
        - file: contributing/static_widgets.md
          title: Adding widgets to docs
        - file: contributing/ai_context.md
          title: AI Context

site:
  template: book-theme
  title: xmris
  options:
    logo: assets/logo.svg
    logo_dark: assets/logo_dark.svg
    favicon: assets/favicon.ico

  nav:
    - title: Home
      url: /index
    - title: API
      url: /index-1

  actions:
    - title: GitHub
      url: https://github.com/andrewendlinger/xmris